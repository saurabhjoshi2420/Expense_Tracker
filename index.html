<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expenses">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E8445A">
<title>Expense Tracker</title>
<script>
/* Inject PWA manifest so Android Chrome opens in standalone (no URL bar) */
(function(){
  var svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">'
    +'<rect width="512" height="512" rx="112" fill="#E8445A"/>'
    +'<text x="256" y="352" font-family="Arial,sans-serif" font-size="310" font-weight="700" '
    +'text-anchor="middle" fill="#fff">E</text></svg>';
  var iUrl=URL.createObjectURL(new Blob([svg],{type:"image/svg+xml"}));
  var mf=JSON.stringify({
    name:"Expense Tracker",short_name:"Expenses",
    display:"standalone",orientation:"portrait",
    background_color:"#E8445A",theme_color:"#E8445A",
    start_url:location.pathname,scope:location.pathname,
    icons:[
      {src:iUrl,sizes:"192x192",type:"image/svg+xml"},
      {src:iUrl,sizes:"512x512",type:"image/svg+xml"}
    ]
  });
  var l=document.createElement("link");
  l.rel="manifest";
  l.href=URL.createObjectURL(new Blob([mf],{type:"application/json"}));
  document.head.appendChild(l);
})();
</script>
<style>
/* ══ Shared Tokens ══ */
:root{
  --bg:#FFF5F6;--card:#fff;--accent:#E8445A;--accent-dark:#C73652;
  --green:#34C759;--red:#C0392B;--orange:#FF9500;
  --g1:#8E8E93;--g2:#D4B8BB;--g3:#F5EAEB;--fg:#1C1C1E;
  --r-card:14px;--r-btn:9px;--r-input:9px;
  --sh:0 1px 4px rgba(0,0,0,.08);
  --font:-apple-system,"Helvetica Neue",Arial,sans-serif;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);
  --sr:env(safe-area-inset-right,0px);
}
/* Android overrides */
body.android{
  --accent:#9F1523;--accent-dark:#7B0F1A;
  --bg:#FFF8F7;--g3:#F5DDDB;--g2:#E8C0BD;
  --fg:#201A1A;--g1:#534342;
  --r-card:16px;--r-btn:20px;--r-input:10px;
  --sh:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --font:"Google Sans","Roboto",Arial,sans-serif;
}
/* Reset */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--fg);
  min-height:100dvh;overflow-x:hidden;
  padding-bottom:calc(24px + var(--sb));
  -webkit-tap-highlight-color:transparent;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:none; /* disable pull-to-refresh on Android PWA */
}

/* ══ Splash ══ */
#splash{
  position:fixed;inset:0;z-index:9999;background:#1C1010;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease,visibility .6s ease}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp-logo{font-size:clamp(28px,8vw,48px);font-weight:900;letter-spacing:-1px;
  color:#fff;opacity:0;transform:translateY(18px);
  animation:spUp .7s cubic-bezier(.34,1.56,.64,1) .3s forwards}
.sp-logo .r{color:#E8445A}
.sp-line{width:0;height:2px;background:linear-gradient(90deg,transparent,#E8445A,transparent);
  border-radius:2px;margin:14px 0 12px;
  animation:spLine .6s ease .9s forwards}
.sp-name{font-size:clamp(13px,4vw,20px);font-weight:300;letter-spacing:3px;
  color:#E8445A;opacity:0;transform:translateY(12px);
  animation:spSlide .6s cubic-bezier(.25,.46,.45,.94) 1.5s forwards}
.sp-dot{width:5px;height:5px;border-radius:50%;background:#E8445A;
  margin-top:20px;opacity:0;
  animation:spFade .4s ease 2s forwards,spPulse 1s ease 2.4s infinite}
@keyframes spUp{to{opacity:1;transform:translateY(0)}}
@keyframes spLine{to{width:clamp(180px,50vw,280px)}}
@keyframes spSlide{to{opacity:1;transform:translateY(0)}}
@keyframes spFade{to{opacity:1}}
@keyframes spPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.5);opacity:.3}}

/* ══ Header ══ */
.hdr{
  position:sticky;top:0;z-index:100;background:var(--accent);
  padding:calc(12px + var(--st)) 16px 10px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.18)}
.hdr-left{display:flex;flex-direction:column;gap:3px}
.hdr-app-name{font-size:20px;font-weight:700;letter-spacing:-.3px;color:#fff;line-height:1.1}
.hdr-date-row{display:flex;align-items:baseline;gap:5px}
.hdr-day{font-size:11px;font-weight:500;color:rgba(255,255,255,.75);letter-spacing:.1px}
.hdr-date{font-size:11px;font-weight:400;color:rgba(255,255,255,.6);letter-spacing:.1px}
body.android .hdr{padding:calc(10px + var(--st)) 16px 8px}

/* ══ Wrap ══ */
.wrap{padding:16px calc(16px + var(--sr)) 0 calc(16px + var(--sl));max-width:680px;margin:0 auto}
body.android .wrap{padding-bottom:calc(88px + var(--sb))}

/* ══ Summary ══ */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sum-card{background:var(--card);border-radius:var(--r-card);padding:16px 14px;box-shadow:var(--sh)}
body.android .sum-card{background:#FFDAD7}
.s-lbl{font-size:10px;font-weight:600;color:var(--g1);text-transform:uppercase;letter-spacing:.6px}
.s-val{font-size:clamp(20px,5vw,26px);font-weight:700;margin-top:4px;line-height:1;
  color:var(--accent);word-break:break-all}
.s-val.cnt{color:var(--fg)}
.s-val.grn{color:var(--green)}
.s-val.org{color:var(--orange)}
body.android .s-val{color:#410002}
.s-sub{font-size:10px;color:var(--g1);margin-top:3px;font-weight:500}
/* ══ All-Time Strip ══ */
.alltime-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:9px 14px;background:var(--g3);border-radius:var(--r-card);
  margin-bottom:14px;font-size:12px;color:var(--g1)}
.at-pill{font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  font-size:10px;background:var(--g2);color:var(--g1);
  padding:2px 8px;border-radius:20px;margin-right:2px;flex-shrink:0}
.at-val{font-weight:600;color:var(--fg)}
.at-sep{color:var(--g2);margin:0 4px}

/* ══ Card ══ */
.card{background:var(--card);border-radius:var(--r-card);overflow:hidden;
  margin-bottom:14px;box-shadow:var(--sh)}
.card-hdr{font-size:14px;font-weight:600;padding:13px 16px 10px;
  border-bottom:1px solid var(--g3);
  display:flex;justify-content:space-between;align-items:center;color:var(--g1)}

/* ══ iOS Add Form ══ */
.add-card{margin-bottom:14px}
body.android .add-card{display:none}
.fb{padding:14px 16px 0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--g1);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input{width:100%;border:none;outline:none;background:var(--g3);
  border-radius:var(--r-input);padding:11px 12px;font-size:15px;
  color:var(--fg);font-family:inherit;-webkit-appearance:none;appearance:none;transition:background .15s}
.field input:focus{background:#FFE8EB}
.btn-add-ios{display:block;width:100%;padding:15px;border:none;
  background:var(--accent);color:#fff;font-size:16px;font-weight:600;
  font-family:inherit;cursor:pointer;
  border-radius:0 0 var(--r-card) var(--r-card);transition:background .15s}
.btn-add-ios:active{background:var(--accent-dark)}
.btn-add-ios:disabled{opacity:.55;cursor:not-allowed}

/* ══ Android FAB ══ */
.fab{display:none;position:fixed;bottom:calc(20px + var(--sb));right:20px;z-index:200;
  width:56px;height:56px;border-radius:16px;background:#FFDAD7;border:none;cursor:pointer;
  align-items:center;justify-content:center;font-size:26px;color:#410002;
  box-shadow:0 4px 14px rgba(0,0,0,.22);transition:transform .2s}
body.android .fab{display:flex}
.fab:active{transform:scale(.93)}

/* ══ Bottom Sheet ══ */
.scrim{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .3s}
.scrim.on{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:301;background:var(--card);
  border-radius:28px 28px 0 0;padding:0 0 calc(16px + var(--sb));
  transform:translateY(100%);transition:transform .35s cubic-bezier(.05,.7,.1,1);
  max-width:680px;margin:0 auto;box-shadow:0 -4px 20px rgba(0,0,0,.18)}
.sheet.on{transform:translateY(0)}
.sh-handle{width:32px;height:4px;border-radius:2px;background:var(--g3);margin:10px auto 4px}
.sh-title{font-size:16px;font-weight:600;color:var(--fg);padding:8px 20px 12px;
  border-bottom:1px solid var(--g3)}
.sh-body{padding:16px 20px 0}
.sh-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sh-field{margin-bottom:14px}
.sh-field label{display:block;font-size:11px;font-weight:600;color:var(--g1);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sh-field input{width:100%;border:none;outline:none;background:var(--g3);
  border-radius:var(--r-input);padding:13px 14px;font-size:15px;
  font-family:inherit;color:var(--fg);-webkit-appearance:none;appearance:none;transition:background .15s}
.sh-field input:focus{background:#FFE8EB}
.btn-add-android{display:block;width:100%;padding:15px;border:none;
  background:var(--accent);color:#fff;font-size:15px;font-weight:600;
  font-family:inherit;border-radius:14px;cursor:pointer;transition:background .15s,transform .1s}
.btn-add-android:active{background:var(--accent-dark);transform:scale(.98)}
.btn-add-android:disabled{opacity:.5;cursor:not-allowed}

/* ══ Filter ══ */
.flt-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 16px}
.flt-row select{border:none;outline:none;background:var(--g3);border-radius:var(--r-input);
  padding:9px 10px;font-size:14px;color:var(--fg);font-family:inherit;
  -webkit-appearance:none;appearance:none}
.chip-row{display:none;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 16px}
body.android .flt-row{display:none}
body.android .chip-row{display:flex}
.chip{padding:7px 16px;border-radius:20px;border:1px solid var(--g3);background:transparent;
  color:var(--g1);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .15s}
.chip:active{background:var(--g3)}
.chip.filled{background:var(--g3);border-color:var(--g3);color:var(--accent);font-weight:700}
.chip select{border:none;outline:none;background:transparent;font:inherit;color:inherit;
  cursor:pointer;-webkit-appearance:none;appearance:none}
.pbar{display:none;margin:0 16px 14px;background:#FFF0F2;border-radius:var(--r-input);
  padding:12px 16px;flex-direction:row;justify-content:space-between;align-items:center}
.pbar.on{display:flex}
.pbar-lbl{font-size:13px;font-weight:500;color:#B02040}
.pbar-val{font-size:18px;font-weight:700;color:#B02040}

/* ══ Month Summary ══ */
.ms-row{display:flex;align-items:center;padding:12px 16px;
  border-bottom:1px solid var(--g3);gap:12px;cursor:pointer;transition:background .1s}
.ms-row:last-child{border-bottom:none}
.ms-row:active{background:var(--g3)}
.ms-left{flex:1;min-width:0}
.ms-name{font-size:14px;font-weight:600;color:var(--fg)}
.ms-count{font-size:11px;color:var(--g1);margin-top:2px}
.ms-bar-wrap{height:5px;background:var(--g3);border-radius:3px;margin-top:6px;overflow:hidden}
.ms-bar{height:5px;border-radius:3px;background:var(--accent);transition:width .4s ease}
.ms-highest .ms-bar{background:var(--red)}
.ms-highest .ms-amt{color:var(--red)}
.ms-right{text-align:right;flex-shrink:0}
.ms-amt{font-size:15px;font-weight:700;color:var(--accent)}

/* ══ TX List ══ */
.tx{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--g3);
  gap:12px;cursor:pointer;transition:background .1s;position:relative;overflow:hidden}
.tx:last-child{border-bottom:none}
.tx.sel{background:#FFF0F2}
.tx:active{background:var(--g3)}
/* iOS circle checkbox */
.ck{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:2px solid var(--g2);
  background:var(--card);display:flex;align-items:center;justify-content:center;transition:all .15s}
body.android .ck{display:none}
.tx.sel .ck{background:var(--accent);border-color:var(--accent)}
.ck svg{display:none}
.tx.sel .ck svg{display:block}
/* Android emoji avatar */
.av{display:none;width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:var(--g3);align-items:center;justify-content:center;font-size:18px;transition:all .15s}
body.android .av{display:flex}
.tx.sel .av{background:var(--accent)}
.tx.sel .av .av-em{display:none}
.tx.sel .av::after{content:"\2713";font-size:16px;color:#fff;font-weight:700}
.ti{flex:1;min-width:0}
.tn{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-em{margin-left:5px;font-style:normal}
body.android .tx-em{display:none}
.td{font-size:11px;color:var(--g1);margin-top:2px}
.ta{font-size:14px;font-weight:600;color:var(--accent);white-space:nowrap}

/* ══ Buttons ══ */
.btn{padding:9px 16px;border:none;border-radius:var(--r-btn);
  font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-bl{background:var(--accent);color:#fff}
.btn-nt{background:var(--g3);color:var(--fg)}
.btn-del{background:#FFE5E5;color:var(--red)}
.exp-row{padding:10px 16px 14px;display:flex;gap:8px;flex-wrap:wrap}

/* ══ States ══ */
.empty{padding:48px 16px;text-align:center;color:var(--g1);font-size:15px}
.empty-ic{font-size:40px;margin-bottom:10px}
.spin-wrap{padding:32px;display:flex;justify-content:center}
.spin{width:24px;height:24px;border:3px solid var(--g2);
  border-top-color:var(--accent);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ══ Toast / Snackbar ══ */
.toast{position:fixed;bottom:calc(28px + var(--sb));left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(28,28,30,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:#fff;padding:11px 22px;border-radius:22px;font-size:14px;font-weight:500;
  z-index:999;pointer-events:none;white-space:nowrap;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.toast.on{transform:translateX(-50%) translateY(0)}
body.android .toast{border-radius:4px;backdrop-filter:none;background:#322F30;color:#ECE0DE;
  bottom:calc(80px + var(--sb));box-shadow:0 4px 12px rgba(0,0,0,.3);
  transition:transform .25s cubic-bezier(.05,.7,.1,1),opacity .25s;
  transform:translateX(-50%) translateY(24px);opacity:0}
body.android .toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* ══ Milestone Modal ══ */
/* --- keyframes --- */
@keyframes msSlideUp    {from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes msBadgeBlink1{0%,100%{opacity:1}50%{opacity:.45}}               /* lvl1: soft fade 1.4s */
@keyframes msBadgeBlink2{0%,100%{opacity:1}50%{opacity:.35}}               /* lvl2: medium 1.1s */
@keyframes msIconBounce {0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}  /* lvl2 icon */
@keyframes msWarnFlash  {0%,100%{box-shadow:0 -4px 24px rgba(192,57,43,.2)}
                         50%{box-shadow:0 -8px 32px rgba(220,53,43,.55)}}  /* lvl3 modal glow */
@keyframes msBadgeWarn  {0%,100%{background:#FDDBD8;color:#8B1A1A}
                         50%{background:#E8445A;color:#fff}}               /* lvl3 badge flash */
@keyframes msCritBlink  {0%,100%{opacity:1}40%{opacity:.6}}                /* lvl4 modal blink */
@keyframes msCritStripe {0%,100%{opacity:1;box-shadow:0 0 10px #E8445A}
                         50%{opacity:.5;box-shadow:0 0 28px #FF2D55}}      /* lvl4 stripe throb */
@keyframes msCritIcon   {0%,100%{transform:scale(1) rotate(0deg)}
                         20%{transform:scale(1.18) rotate(-8deg)}
                         40%{transform:scale(1.18) rotate(8deg)}
                         60%{transform:scale(1.1) rotate(-4deg)}
                         80%{transform:scale(1.1) rotate(4deg)}}           /* lvl4 shake+scale */
@keyframes msCritScrim  {0%,100%{background:rgba(0,0,0,.72)}
                         50%{background:rgba(80,0,0,.78)}}                 /* lvl4 scrim pulse */
/* --- scrim --- */
.ms-scrim{position:fixed;inset:0;z-index:10000;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s}
.ms-scrim.on{opacity:1;pointer-events:all}
.ms-scrim.lvl1{background:rgba(0,0,0,.35)}
.ms-scrim.lvl2{background:rgba(0,0,0,.48)}
.ms-scrim.lvl3{background:rgba(0,0,0,.60)}
.ms-scrim.lvl4.on{animation:msCritScrim 1.4s ease infinite}
/* --- modal base --- */
.ms-modal{
  border-radius:24px 24px 0 0;
  padding:32px 24px calc(32px + var(--sb));width:100%;max-width:480px;
  transform:translateY(100%);
  transition:transform .42s cubic-bezier(.05,.7,.1,1);
  position:relative;overflow:hidden}
.ms-scrim.on .ms-modal{transform:translateY(0)}
/* --- level 1 : subtle --- */
.ms-scrim.lvl1 .ms-modal{background:#fff;box-shadow:0 -2px 16px rgba(0,0,0,.1)}
.ms-scrim.lvl1 .ms-stripe{background:#FF9500;height:3px}
.ms-scrim.lvl1 .ms-icon{font-size:36px}
.ms-scrim.lvl1 .ms-badge{background:#FFF0E0;color:#B05800;
  animation:msBadgeBlink1 1.4s ease infinite}
/* --- level 2 : caution --- */
.ms-scrim.lvl2 .ms-modal{background:#FFF8F0;box-shadow:0 -3px 20px rgba(180,80,0,.18)}
.ms-scrim.lvl2 .ms-stripe{background:linear-gradient(90deg,#FF9500,#E8445A);height:3px}
.ms-scrim.lvl2 .ms-icon{font-size:44px;animation:msIconBounce 1.1s ease infinite}
.ms-scrim.lvl2 .ms-badge{background:#FDEBD0;color:#904000;
  animation:msBadgeBlink2 1.1s ease infinite}
/* --- level 3 : warning --- */
.ms-scrim.lvl3 .ms-modal{background:#FFF2F0;
  animation:msWarnFlash 1s ease infinite}
.ms-scrim.lvl3 .ms-stripe{background:#E8445A;height:4px}
.ms-scrim.lvl3 .ms-icon{font-size:52px;animation:msIconBounce .85s ease infinite}
.ms-scrim.lvl3 .ms-badge{animation:msBadgeWarn .85s ease infinite;
  font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
.ms-scrim.lvl3 .ms-msg{font-size:16px}
/* --- level 4 : critical --- */
.ms-scrim.lvl4 .ms-modal{background:#1C0A0A;
  animation:msCritBlink .7s ease infinite}
.ms-scrim.lvl4 .ms-stripe{background:linear-gradient(90deg,#E8445A,#FF2D55,#E8445A);height:6px;
  animation:msCritStripe .7s ease infinite}
.ms-scrim.lvl4 .ms-icon{font-size:64px;animation:msCritIcon .9s ease infinite}
.ms-scrim.lvl4 .ms-badge{background:rgba(232,68,90,.25);color:#FF8096}
.ms-scrim.lvl4 .ms-msg{color:#fff;font-size:18px;font-weight:700}
.ms-scrim.lvl4 .ms-btn-later{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
/* --- shared badge defaults (overridden per level above) --- */
.ms-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
/* --- stripe base --- */
.ms-stripe{width:100%;position:absolute;top:0;left:0;border-radius:3px 3px 0 0}
/* --- icon wrap --- */
.ms-icon-wrap{text-align:center;margin-bottom:10px}
.ms-icon{display:inline-block}
/* --- message --- */
.ms-msg{font-size:15px;font-weight:600;color:var(--fg);text-align:center;
  line-height:1.5;margin-bottom:24px}
/* --- buttons --- */
.ms-btns{display:flex;gap:10px}
.ms-btn-review{flex:1;padding:14px;border:none;background:var(--accent);color:#fff;
  font-size:14px;font-weight:600;font-family:inherit;border-radius:12px;cursor:pointer;transition:background .15s}
.ms-btn-review:active{background:var(--accent-dark)}

/* ── IndexedDB ── */
const DB_NAME="ExpenseTrackerDB",DB_VER=1,STORE="expenses";
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE))
        d.createObjectStore(STORE,{keyPath:"id",autoIncrement:true})
         .createIndex("date","date",{unique:false});
    };
    req.onsuccess=e=>{db=e.target.result;res(db)};
    req.onerror=()=>rej(req.error);
  });
}
function dbs(mode){return db.transaction(STORE,mode).objectStore(STORE)}
function getAll(){
  return new Promise(res=>{
    const rows=[];
    dbs("readonly").openCursor(null,"prev").onsuccess=e=>{
      const c=e.target.result;
      if(c){rows.push(c.value);c.continue()}else res(rows);
    };
  });
}
function getFiltered(month,year){
  return new Promise(res=>{
    const rows=[];
    dbs("readonly").openCursor(null,"prev").onsuccess=e=>{
      const c=e.target.result;
      if(c){
        if((c.value.date||"").startsWith(year+"-"+month))rows.push(c.value);
        c.continue();
      }else res(rows);
    };
  });
}
function addRecord(rec){
  return new Promise((res,rej)=>{
    const req=dbs("readwrite").add(rec);
    req.onsuccess=()=>res();req.onerror=()=>rej(req.error);
  });
}
function deleteRecords(ids){
  return new Promise((res,rej)=>{
    const s=dbs("readwrite");let p=ids.length;
    ids.forEach(id=>{
      const r=s.delete(id);
      r.onsuccess=()=>{if(!--p)res()};
      r.onerror=()=>rej(r.error);
    });
  });
}

/* ── Helpers ── */
function inr(n){
  return "\u20B9\u202F"+parseFloat(n).toLocaleString("en-IN",
    {minimumFractionDigits:2,maximumFractionDigits:2});
}
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
let _tt;
function toast(msg,ms=2400){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("on");
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("on"),ms);
}
function updateDelBtn(){
  const n=selectedIds.size;
  const allItems=document.querySelectorAll("#txList .tx");
  const total=allItems.length;
  const btn=document.getElementById("delBtn");
  const selBtn=document.getElementById("selAllBtn");
  btn.style.display=n?"block":"none";
  if(n)btn.textContent="Delete ("+n+")";
  selBtn.style.display=total?"block":"none";
  selBtn.textContent=(n>0&&n===total)?"Deselect All":"Select All";
}
function toggleSelectAll(){
  const allItems=document.querySelectorAll("#txList .tx");
  const total=allItems.length;
  if(selectedIds.size===total){
    /* deselect all */
    allItems.forEach(item=>{selectedIds.delete(parseInt(item.dataset.id));item.classList.remove("sel");});
  } else {
    /* select all */
    allItems.forEach(item=>{selectedIds.add(parseInt(item.dataset.id));item.classList.add("sel");});
  }
  updateDelBtn();
}

/* ── Milestone Popup ── */
const MILESTONES=[
  {limit:10000,  lvl:1, badge:"\u20B910,000 Milestone", icon:"\uD83D\uDCA1", msg:"\u20B910K milestone reached. Awareness is the first step to control."},
  {limit:25000,  lvl:2, badge:"\u20B925,000 Alert",     icon:"\u23F8\uFE0F",  msg:"\u20B925K spent. A short review now can save a lot later."},
  {limit:50000,  lvl:3, badge:"\u20B950,000 Warning",   icon:"\u26A0\uFE0F",  msg:"\u20B950K crossed. Maybe it\u2019s time to pause and rethink priorities."},
  {limit:100000, lvl:4, badge:"\u20B91,00,000 Critical",icon:"\uD83D\uDEA8",  msg:"\u20B91L milestone reached. This deserves your full attention."}
];
const MS_KEY="et_ms_"; /* prefix; full key = MS_KEY+YYYY-MM */
function _msCurMonth(){
  const d=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}
function getShownMilestones(){
  try{return JSON.parse(localStorage.getItem(MS_KEY+_msCurMonth())||"[]")}catch{return [];}
}
function markMilestoneShown(limit){
  const shown=getShownMilestones();
  if(!shown.includes(limit)){
    shown.push(limit);
    localStorage.setItem(MS_KEY+_msCurMonth(),JSON.stringify(shown));
  }
}
function checkMilestone(total){
  const shown=getShownMilestones();
  for(const m of MILESTONES){
    if(total>=m.limit&&!shown.includes(m.limit)){
      showMilestone(m);break; /* show only one at a time, highest crossed first */
    }
  }
}
function showMilestone(m){
  const scrim=document.getElementById("msScrim");
  scrim.className="ms-scrim lvl"+m.lvl;
  document.getElementById("msIcon").textContent=m.icon;
  document.getElementById("msBadge").textContent=m.badge;
  document.getElementById("msMsg").textContent=m.msg;
  scrim.dataset.limit=m.limit;
  /* double-rAF: first frame lets browser register the new className,
     second frame adds .on so the CSS opacity/transform transition fires */
  requestAnimationFrame(()=>requestAnimationFrame(()=>scrim.classList.add("on")));
}
function closeMilestone(review){
  const el=document.getElementById("msScrim");
  const limit=parseInt(el.dataset.limit);
  markMilestoneShown(limit);
  el.classList.remove("on");
  setTimeout(()=>el.className="ms-scrim",400);
  if(review){
    document.getElementById("txList").closest(".card")
      .scrollIntoView({behavior:"smooth",block:"start"});
  }
}

/* ── Summary ── */
async function refreshSummary(){
  const all=await getAll();
  /* current month in IST */
  const _ist=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));
  const curM=String(_ist.getMonth()+1).padStart(2,"0"),curY=String(_ist.getFullYear());
  const curPfx=curY+"-"+curM;
  const cur=all.filter(r=>(r.date||"").startsWith(curPfx));
  const curCount=cur.length,curTotal=cur.reduce((s,r)=>s+r.amount,0);
  const allCount=all.length,allTotal=all.reduce((s,r)=>s+r.amount,0);
  /* this-month cards */
  document.getElementById("sCount").textContent=curCount||0;
  document.getElementById("sTotal").textContent=curTotal?inr(curTotal):"\u20B90";
  document.getElementById("sTotal").className=
    "s-val"+(curTotal>=50000?" org":curTotal>=10000?" grn":"");
  /* all-time strip */
  document.getElementById("atCount").textContent=allCount;
  document.getElementById("atTotal").textContent=inr(allTotal);
  buildMonthSummary(all);
  return curTotal; /* returned so doAdd can trigger milestone check */
}

/* ── Month Summary ── */
function buildMonthSummary(rows){
  const el=document.getElementById("msList"),map={};
  (rows||[]).forEach(r=>{
    const k=(r.date||"").slice(0,7);if(!k)return;
    if(!map[k])map[k]={total:0,count:0};
    map[k].total+=r.amount;map[k].count++;
  });
  const keys=Object.keys(map).sort().reverse();
  if(!keys.length){
    el.innerHTML='<div class="empty"><div class="empty-ic">\uD83D\uDCC5</div>No data yet</div>';return;
  }
  const maxT=Math.max(...keys.map(k=>map[k].total));
  el.innerHTML="";
  keys.forEach(key=>{
    const[yr,mo]=key.split("-"),{total,count}=map[key];
    const pct=maxT>0?Math.round(total/maxT*100):0;
    const isHi=total===maxT&&keys.length>1;
    const row=document.createElement("div");
    row.className="ms-row"+(isHi?" ms-highest":"");
    row.innerHTML='<div class="ms-left">'
      +'<div class="ms-name">'+esc(MN[parseInt(mo,10)]||mo)+" "+esc(yr)+'</div>'
      +'<div class="ms-count">'+count+" transaction"+(count!==1?"s":"")+'</div>'
      +'<div class="ms-bar-wrap"><div class="ms-bar" style="width:'+pct+'%"></div></div></div>'
      +'<div class="ms-right"><div class="ms-amt">'+inr(total)+'</div>'
      +(isHi?'<div style="font-size:10px;color:var(--red);font-weight:600;margin-top:2px">HIGHEST</div>':"")
      +'</div>';
    row.addEventListener("click",async()=>{
      currentFilter={month:mo,year:yr};
      ["selMonth","selMonthA"].forEach(id=>document.getElementById(id).value=mo);
      ["selYear","selYearA"].forEach(id=>document.getElementById(id).value=yr);
      document.getElementById("pbar").classList.remove("on");
      await loadList(mo,yr);
      document.getElementById("txList").closest(".card")
        .scrollIntoView({behavior:"smooth",block:"start"});
    });
    el.appendChild(row);
  });
}

/* ── Load List ── */
async function loadList(month,year){
  selectedIds.clear();updateDelBtn();
  document.getElementById("txList").innerHTML=
    '<div class="spin-wrap"><div class="spin"></div></div>';
  const rows=(month&&year)?await getFiltered(month,year):await getAll();
  rows.sort((a,b)=>b.date>a.date?1:-1);
  const list=document.getElementById("txList");
  if(!rows.length){
    list.innerHTML='<div class="empty"><div class="empty-ic">\uD83D\uDCB8</div>No expenses found</div>';return;
  }
  list.innerHTML="";
  rows.forEach(row=>{
    const emoji=getEmoji(row.purpose);
    const item=document.createElement("div");
    item.className="tx";item.dataset.id=row.id;
    item.innerHTML='<div class="ck"><svg width="12" height="10" viewBox="0 0 12 10" fill="none">'
      +'<path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
      +'<div class="av"><span class="av-em">'+esc(emoji)+'</span></div>'
      +'<div class="ti"><div class="tn">'+esc(row.purpose)+'<span class="tx-em">'+emoji+'</span></div>'
      +'<div class="td">'+esc(row.date)+'</div></div>'
      +'<div class="ta">'+inr(row.amount)+'</div>';
    item.addEventListener("click",()=>toggleSel(item,row.id));
    list.appendChild(item);
  });
  updateDelBtn(); /* show Select All once items are rendered */
  if(month&&year){
    const sum=rows.reduce((s,r)=>s+r.amount,0);
    document.getElementById("pbarVal").textContent=inr(sum);
    document.getElementById("pbar").classList.add("on");
  }
}
function toggleSel(item,id){
  if(selectedIds.has(id)){selectedIds.delete(id);item.classList.remove("sel")}
  else{selectedIds.add(id);item.classList.add("sel")}
  updateDelBtn();
}

/* ── Add ── */
async function doAdd(dateId,amtId,purId,btnId,afterFn){
  const date=document.getElementById(dateId).value.trim();
  const rawAmt=document.getElementById(amtId).value.trim();
  const purpose=document.getElementById(purId).value.trim();
  if(!date||!rawAmt||!purpose){toast("\u26A0\uFE0F  All fields are required");return}
  const amount=parseFloat(rawAmt);
  if(isNaN(amount)||amount<=0||amount>10000000){toast("\u26A0\uFE0F  Enter a valid amount");return}
  if(!/^\d{4}-\d{2}-\d{2}$/.test(date)){toast("\u26A0\uFE0F  Invalid date");return}
  const _todayIST=new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"});
  if(date>_todayIST){toast("\uD83D\uDEAB  Future dates not allowed. You can only log today or past expenses.");return}
  const btn=document.getElementById(btnId);
  btn.disabled=true;const orig=btn.textContent;btn.textContent="Adding\u2026";
  try{
    await addRecord({date,amount,purpose});
    document.getElementById(amtId).value="";
    document.getElementById(purId).value="";
    if(afterFn)afterFn();
    toast("\u2713  Expense added");
    document.getElementById("pbar").classList.remove("on");
    await loadList(currentFilter?.month,currentFilter?.year);
    const _mt=await refreshSummary();
    checkMilestone(_mt); /* only fires on add, based on this month's total */
  }catch{toast("\u26A0\uFE0F  Could not save")}
  finally{btn.disabled=false;btn.textContent=orig}
}

/* ── Delete ── */
async function deleteSelected(){
  if(!selectedIds.size)return;
  if(!confirm("Delete "+selectedIds.size+" expense(s)?"))return;
  try{
    await deleteRecords([...selectedIds]);
    toast("\u2713  Deleted "+selectedIds.size+" expense(s)");
    document.getElementById("pbar").classList.remove("on");
    await loadList(currentFilter?.month,currentFilter?.year);
    await refreshSummary();
  }catch{toast("\u26A0\uFE0F  Could not delete")}
}

/* ── Filter ── */
function getFilterVals(){
  return IS_ANDROID
    ?{month:document.getElementById("selMonthA").value,year:document.getElementById("selYearA").value}
    :{month:document.getElementById("selMonth").value,year:document.getElementById("selYear").value};
}
async function applyFilter(){
  const{month,year}=getFilterVals();
  currentFilter={month,year};
  ["selMonth","selMonthA"].forEach(id=>document.getElementById(id).value=month);
  ["selYear","selYearA"].forEach(id=>document.getElementById(id).value=year);
  document.getElementById("pbar").classList.remove("on");
  await loadList(month,year);
}
async function resetFilter(){
  currentFilter=null;
  document.getElementById("pbar").classList.remove("on");
  await loadList();
}

/* ── Import ── */
async function importCSV(input){
  const file=input.files[0];if(!file)return;
  input.value=""; /* reset so same file can be re-imported if needed */
  const text=await file.text();
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){toast("\u26A0\uFE0F  CSV is empty or invalid");return}
  /* skip header row */
  const rows=[];
  for(let i=1;i<lines.length;i++){
    /* parse: date,amount,"purpose" — handle quoted commas in purpose */
    const m=lines[i].match(/^(\d{4}-\d{2}-\d{2}),([\d.]+),"?(.*?)"?$/);
    if(!m)continue;
    const date=m[1].trim();
    const amount=parseFloat(m[2]);
    const purpose=m[3].replace(/""/g,'"').trim();
    if(!date||isNaN(amount)||amount<=0||!purpose)continue;
    rows.push({date,amount,purpose});
  }
  if(!rows.length){toast("\u26A0\uFE0F  No valid rows found in CSV");return}
  /* check for duplicates against existing data */
  const existing=await getAll();
  const exKeys=new Set(existing.map(r=>r.date+"|"+r.amount+"|"+r.purpose.trim().toLowerCase()));
  const toAdd=rows.filter(r=>!exKeys.has(r.date+"|"+r.amount+"|"+r.purpose.trim().toLowerCase()));
  if(!toAdd.length){toast("\u2139\uFE0F  All rows already exist — nothing imported");return}
  let imported=0;
  for(const r of toAdd){
    try{await addRecord(r);imported++;}catch{/* skip failed rows */}
  }
  toast("\u2713  Imported "+imported+" expense"+(imported!==1?"s":"")
    +(rows.length-imported>0?" ("+(rows.length-imported)+" duplicates skipped)":""));
  await loadList(currentFilter?.month,currentFilter?.year);
  await refreshSummary();
}

/* ── Export ── */
async function exportCSV(){
  const rows=currentFilter?await getFiltered(currentFilter.month,currentFilter.year):await getAll();
  if(!rows.length){toast("\u26A0\uFE0F  Nothing to export");return}
  let csv="Date,Amount,Purpose\n";
  rows.forEach(r=>{const p=String(r.purpose).replace(/"/g,'""');
    csv+=r.date+","+r.amount.toFixed(2)+',"'+p+'"\n'});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="expenses_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();URL.revokeObjectURL(a.href);
  toast("\u2713  CSV downloaded");
}

/* ── Ripple (Android) ── */
if(IS_ANDROID){
  document.addEventListener("click",e=>{
    const el=e.target.closest(".tx,.ms-row,.chip,.fab");
    if(!el)return;
    const r=document.createElement("span");r.className="ripple-el";
    const rect=el.getBoundingClientRect(),sz=Math.max(rect.width,rect.height)*2;
    r.style.cssText="width:"+sz+"px;height:"+sz+"px;"
      +"left:"+(e.clientX-rect.left-sz/2)+"px;top:"+(e.clientY-rect.top-sz/2)+"px";
    el.appendChild(r);setTimeout(()=>r.remove(),600);
  });
}

/* ── Init ── */
(async()=>{
  setTimeout(()=>document.getElementById("splash").classList.add("hide"),3500);
  const now=new Date();
  const IST={timeZone:"Asia/Kolkata"};
  document.getElementById("hdrDay").textContent=
    now.toLocaleString("en-IN",{weekday:"long",...IST});
  document.getElementById("hdrDate").textContent=
    now.toLocaleString("en-IN",{day:"numeric",month:"long",year:"numeric",...IST});
  const td=now.toLocaleDateString("en-CA",IST); /* YYYY-MM-DD in IST */
  document.getElementById("iDate").value=td;
  document.getElementById("iDateA").value=td;
  ["selMonth","selMonthA"].forEach(id=>{
    const sel=document.getElementById(id);
    MN.slice(1).forEach((m,i)=>{
      const o=document.createElement("option");
      o.value=String(i+1).padStart(2,"0");o.textContent=m;
      if(i===now.getMonth())o.selected=true;
      sel.appendChild(o);
    });
  });
  ["selYear","selYearA"].forEach(id=>{
    const sel=document.getElementById(id);
    for(let y=2022;y<=2032;y++){
      const o=document.createElement("option");
      o.value=y;o.textContent=y;
      if(y===now.getFullYear())o.selected=true;
      sel.appendChild(o);
    }
  });
  document.getElementById("addBtnIos")
    .addEventListener("click",()=>doAdd("iDate","iAmt","iPurpose","addBtnIos",null));
  document.getElementById("iPurpose")
    .addEventListener("keydown",e=>{if(e.key==="Enter")doAdd("iDate","iAmt","iPurpose","addBtnIos",null)});
  document.getElementById("fab").addEventListener("click",openSheet);
  document.getElementById("addBtnAndroid")
    .addEventListener("click",()=>doAdd("iDateA","iAmtA","iPurposeA","addBtnAndroid",closeSheet));
  document.getElementById("iPurposeA")
    .addEventListener("keydown",e=>{if(e.key==="Enter")doAdd("iDateA","iAmtA","iPurposeA","addBtnAndroid",closeSheet)});
  let ty=0;
  document.getElementById("sheet").addEventListener("touchstart",e=>{ty=e.touches[0].clientY},{passive:true});
  document.getElementById("sheet").addEventListener("touchend",e=>{
    if(e.changedTouches[0].clientY-ty>60)closeSheet()},{passive:true});
  try{
    await openDB();await loadList();await refreshSummary();
  }catch(err){
    document.getElementById("txList").innerHTML=
      '<div class="empty">\u26A0\uFE0F Storage error: '+esc(err.message)+'</div>';
  }
})();
</script>
